name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to kat-jr.com
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, zip, gd, intl, exif, bcmath, pdo_mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-progress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Verify encrypted environment file
        run: test -f .env.production.encrypted

      - name: Decrypt environment file
        env:
          LARAVEL_ENV_ENCRYPTION_KEY: ${{ secrets.LARAVEL_ENV_ENCRYPTION_KEY }}
        run: |
          if [[ -z "${LARAVEL_ENV_ENCRYPTION_KEY:-}" ]]; then
            echo "LARAVEL_ENV_ENCRYPTION_KEY is not set (add it to GitHub Actions secrets)." >&2
            exit 1
          fi
          php artisan env:decrypt --env=production --force --filename=.env --no-interaction

      - name: Sync files to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --include=.env --exclude=.env.production.encrypted --exclude=.git --exclude=.github --exclude=.env.backup --exclude=.env.production --exclude=.env.staging --exclude=.env.local --exclude=.env.*.local --exclude=node_modules --exclude=tests --exclude=storage/logs --exclude=storage/framework/cache/data --exclude=storage/framework/sessions --exclude=storage/framework/views --exclude=storage/app/public --exclude=storage/app/private --exclude=storage/app/backups --exclude=.phpunit.result.cache --exclude=.phpunit.cache
          path: ./
          remote_path: /var/www/html/erp/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          remote_port: ${{ secrets.SSH_PORT }}

      - name: Run remote deploy commands
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /var/www/html/erp

            if [[ ! -f .env ]]; then
              echo ".env not found on server after sync." >&2
              exit 1
            fi

            # Encrypted file must not remain on the server (decrypted in CI only)
            rm -f .env.production.encrypted

            # Ensure Laravel writable dirs exist (persist across rsync --delete)
            mkdir -p storage/framework/{cache/data,sessions,views} storage/logs storage/app/{public,private,backups}
            mkdir -p bootstrap/cache

            chmod 640 .env 2>/dev/null || true

            php artisan storage:link --force 2>/dev/null || true

            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            php artisan queue:restart || true

            # Web server user (adjust if your distro uses nginx/apache)
            if id www-data &>/dev/null; then
              sudo chown -R www-data:www-data storage bootstrap/cache
              sudo chmod -R ug+rwx storage bootstrap/cache
            fi

            php artisan up || true
